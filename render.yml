services:
  - type: web
    name: nanguard-api
    runtime: python
    rootDir: fast_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nandguard_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173